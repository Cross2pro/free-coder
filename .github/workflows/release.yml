name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_name: free-code-linux-x64
            targets: linux-x64,linux-x64-musl
          - runner: ubuntu-24.04-arm
            artifact_name: free-code-linux-arm64
            targets: linux-arm64,linux-arm64-musl
          - runner: windows-latest
            artifact_name: free-code-windows-x64
            targets: windows-x64
          - runner: windows-11-arm
            artifact_name: free-code-windows-arm64
            targets: windows-arm64
          - runner: macos-15-intel
            artifact_name: free-code-macos-x64
            targets: macos-x64
          - runner: macos-14
            artifact_name: free-code-macos-arm64
            targets: macos-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build release archives
        run: bun run release:build --targets=${{ matrix.targets }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') && always()
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: dist/collected

      - name: Flatten release files
        run: |
          mkdir -p dist/release
          if [ -d dist/collected ]; then
            find dist/collected -type f -exec cp {} dist/release/ \;
          fi

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
